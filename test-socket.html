<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test WebSockets CoStream</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; padding: 20px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Consola de Pruebas: CoStream Sockets</h1>
    
    <button onclick="conectar()">1. Conectar al Gateway</button>
    <button onclick="enviarMensaje()">2. Enviar Chat</button>

    <script>
        // 👇 Pega aquí los datos que sacaste de tu API
        const ROOM_ID = "15a754c7-8b7c-4627-a139-05647746a750";
        const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJuYW1lIjoiSG9zdCIsInZpZGVvIjp7InJvb21Kb2luIjp0cnVlLCJyb29tIjoiMTVhNzU0YzctOGI3Yy00NjI3LWExMzktMDU2NDc3NDZhNzUwIiwiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuU3Vic2NyaWJlIjp0cnVlfSwiaXNzIjoiQVBJV2VYRzdOdnVXZUJRIiwiZXhwIjoxNzgxMzM5NjM0LCJuYmYiOjE3ODEzMTgwMzQsInN1YiI6IjJmMjA2NDg2LTFjY2ItNGRjNi04MmU2LTAxMGY2NmFiNTFkNyJ9.R34ZRvBxmjZXvu8tx_EEME3VTfSLQX8E4G4wq3t81VM";

        let socket;

        function conectar() {
            console.log("Intentando conectar...");
            // Inicializamos la conexión inyectando el token de LiveKit en el objeto auth
            socket = io('http://localhost:3000', {
                auth: { token: TOKEN }
            });

            // Escuchamos eventos de conexión nativos
            socket.on('connect', () => {
                console.log('✅ CONECTADO EXITOSAMENTE. Socket ID:', socket.id);
            });

            socket.on('disconnect', (reason) => {
                console.error('❌ DESCONECTADO:', reason);
            });

            // Escuchamos los eventos que programamos en el backend
            socket.on('room:state_changed', (data) => {
                console.log('🔄 ESTADO DEL ESCENARIO ACTUALIZADO:', data);
            });

            socket.on('chat:broadcast', (data) => {
                console.log('💬 NUEVO MENSAJE RECIBIDO:', data);
            });
        }

        function enviarMensaje() {
            if (!socket || !socket.connected) return alert("Conéctate primero usando el botón 1");
            
            const payload = {
                roomId: ROOM_ID,
                text: "¡Prueba de fuego del Sprint 2!"
            };
            
            console.log("⬆️ Enviando mensaje...", payload);
            socket.emit('chat:send', payload);
        }
    </script>
</body>
</html>
