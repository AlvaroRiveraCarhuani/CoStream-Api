services:
  costream-db:
    image: postgres:16
    container_name: costream-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - costream_data:/var/lib/postgresql/data

volumes:
  costream_data: